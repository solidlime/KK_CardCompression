name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish desktop tool
        run: |
          dotnet publish KK_CardCompression.csproj -c Release `
            --self-contained false `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o publish-desktop/

      - name: Get version from tag
        id: version
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
        run: echo "version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "KKCC ${{ github.ref_name }}"
          body: |
            ## KKCC ${{ github.ref_name }}

            Koikatsu カード・シーン PNG ファイルの LZMA ロスレス圧縮／解凍ツール

            ### ダウンロード

            | ファイル | 説明 |
            |----------|------|
            | `KK_CardCompression.exe` | デスクトップツール（.NET 8 Runtime 必要） |

            ### 使い方
            1. [.NET 8 Desktop Runtime](https://dotnet.microsoft.com/download/dotnet/8.0) をインストール
            2. `KK_CardCompression.exe` を実行
            3. ファイルをドロップして「圧縮」をクリック

            ### 互換性
            - 圧縮形式は KK_SaveLoadCompression.dll（LZMA マーカー101）と完全互換
            - 解凍には KK_SaveLoadCompression.dll が必要
          files: |
            publish-desktop/KK_CardCompression.exe
          draft: false
          prerelease: false
