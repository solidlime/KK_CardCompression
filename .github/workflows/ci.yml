name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # --- デスクトップツール ---

      - name: Build desktop tool
        run: dotnet build KK_CardCompression.csproj -c Release

      - name: Publish desktop tool (single-file)
        run: |
          dotnet publish KK_CardCompression.csproj -c Release `
            --self-contained false `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o publish-desktop/

      # --- BepInEx プラグイン ---

      # ILRepackの参照解決のため、NuGetパッケージから参照DLLを出力ディレクトリにコピー
      - name: Copy reference DLLs for ILRepack
        shell: pwsh
        run: |
          $outDir = "KK_CardCompression.Plugin/bin/Release/net48"
          $nugetRoot = "$env:USERPROFILE/.nuget/packages"
          if ($IsLinux -or $IsMacOS) { $nugetRoot = "$env:HOME/.nuget/packages" }
          
          $refDlls = @(
            "$nugetRoot/bepinex.baselib/5.4.20/lib/net35/BepInEx.dll",
            "$nugetRoot/harmonyx/2.7.0/lib/net45/0Harmony.dll",
            "$nugetRoot/illusionlibs.bepinex.harmony/2.3.2/lib/net35/BepInEx.Harmony.dll",
            "$nugetRoot/illusionlibs.koikatsusunshine.assembly-csharp/2021.9.17/lib/net46/Assembly-CSharp.dll",
            "$nugetRoot/illusionlibs.koikatsusunshine.assembly-csharp-firstpass/2021.9.17/lib/net46/Assembly-CSharp-firstpass.dll",
            "$nugetRoot/illusionlibs.koikatsusunshine.unityengine.coremodule/2019.4.9/lib/net46/UnityEngine.CoreModule.dll",
            "$nugetRoot/illusionlibs.koikatsusunshine.unityengine.imageconversionmodule/2019.4.9/lib/net46/UnityEngine.ImageConversionModule.dll",
            "$nugetRoot/illusionlibs.koikatsusunshine.unityengine.imguimodule/2019.4.9/lib/net46/UnityEngine.IMGUIModule.dll",
            "$nugetRoot/illusionlibs.koikatsusunshine.unityengine.textrenderingmodule/2019.4.9/lib/net46/UnityEngine.TextRenderingModule.dll",
            "$nugetRoot/illusionlibs.koikatsusunshine.unityengine.ui/2019.4.9/lib/net46/UnityEngine.UI.dll",
            "$nugetRoot/mono.cecil/0.11.4/lib/net40/Mono.Cecil.dll"
          )
          
          foreach ($dll in $refDlls) {
            if (Test-Path $dll) {
              Copy-Item $dll -Destination $outDir -Force
              Write-Host "Copied: $dll"
            } else {
              Write-Host "Not found (may not be needed): $dll"
            }
          }

      - name: Build plugin (ILRepack merges into single DLL)
        run: dotnet build KK_CardCompression.Plugin/KK_CardCompression.Plugin.csproj -c Release

      # --- 結果確認 ---

      - name: Verify outputs
        shell: pwsh
        run: |
          $exe = "publish-desktop/KK_CardCompression.exe"
          $dll = "KK_CardCompression.Plugin/bin/Release/net48/KK_CardCompression.dll"

          $errors = @()
          if (-not (Test-Path $exe)) { $errors += "Desktop EXE not found: $exe" }
          if (-not (Test-Path $dll)) { $errors += "Plugin DLL not found: $dll" }

          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Host "::error::$_" }
            exit 1
          }

          $exeSize = [math]::Round((Get-Item $exe).Length / 1MB, 2)
          $dllSize = [math]::Round((Get-Item $dll).Length / 1KB, 1)

          {
            echo "## Build Results"
            echo ""
            echo "| Artifact | Size |"
            echo "|----------|------|"
            echo "| KK_CardCompression.exe | ${exeSize} MB |"
            echo "| KK_CardCompression.dll | ${dllSize} KB |"
          } >> $env:GITHUB_STEP_SUMMARY

      - name: Upload desktop tool artifact
        uses: actions/upload-artifact@v4
        with:
          name: KKCC-desktop
          path: publish-desktop/KK_CardCompression.exe
          retention-days: 7

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: KKCC-plugin
          path: |
            KK_CardCompression.Plugin/bin/Release/net48/KK_CardCompression.dll
          retention-days: 7