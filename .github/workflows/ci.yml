name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: dotnet build KK_CardCompression.csproj -c Release

      - name: Publish (single-file)
        run: |
          dotnet publish KK_CardCompression.csproj -c Release `
            --self-contained false `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o publish-desktop/

      - name: Verify output
        shell: pwsh
        run: |
          $exe = "publish-desktop/KK_CardCompression.exe"
          if (-not (Test-Path $exe)) {
            Write-Host "::error::Desktop EXE not found: $exe"
            exit 1
          }
          $exeSize = [math]::Round((Get-Item $exe).Length / 1MB, 2)
          echo "## Build Results" >> $env:GITHUB_STEP_SUMMARY
          echo "" >> $env:GITHUB_STEP_SUMMARY
          echo "| Artifact | Size |" >> $env:GITHUB_STEP_SUMMARY
          echo "|----------|------|" >> $env:GITHUB_STEP_SUMMARY
          echo "| KK_CardCompression.exe | ${exeSize} MB |" >> $env:GITHUB_STEP_SUMMARY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: KKCC-desktop
          path: publish-desktop/KK_CardCompression.exe
          retention-days: 7
